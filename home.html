<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
  <style>
    .geist{
        

  font-family: "Geist", sans-serif;
  font-optical-sizing: auto;
  

}
.active{
    background-color: rgb(5, 128, 227);
    color: white !important;
}
.green{
    border-top:  5px solid rgb(10, 161, 10);
}
  .purple{
    border-top: 5px solid rgb(187, 24, 187);
  }
  .red{
    color: red;
    background-color: rgb(251, 190, 190);
    font-weight:500;
    border-radius: 5px;
  }
  .yellow{
    color: yellow;
    background-color: rgb(250, 251, 190);
    font-weight:500;
    border-radius: 5px;
  }
  .gray{
    color: gray;
    background-color: rgb(213, 207, 207);
    font-weight:500;
    border-radius: 5px;
  }
    
</style>
  
    
</head>
<body class="md:w-[1450px] mx-auto mt-3 geist bg-slate-100 ">
    <header>
        <section class="md:flex items-center   justify-between shadow-sm bg-white p-4 mb-3 rounded-md ">
           <div class="flex items-center gap-2 justify-center font-semibold">
             <div class="">
                <img class="w-10 "  src="./B13-A5-Github-Issue-Tracker/assets/github-logo.png" alt="">
            </div>
            <div>
                <h1 class="text-xl">Github Issues Tracker</h1>
            </div>
           </div>
           <!-- search and new issues -->
          <div class="md:flex md:items-center   justify-between gap-2 space-y-3 md:space-y-0 pt-3 md:pt-0">
             <!-- search issues -->
           <div class="flex items-center gap-1 border border-gray-300 p-2 rounded-lg">
            <div>
                <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
            </div>
            <div>
                <input onkeyup="search()" id="search" type="text" placeholder="search issues...." class="border-none" >
            </div>
           </div>
           <!-- new issues -->
           <div class="flex bg-blue-600 px-5 py-2 gap-1 items-center rounded-md">
            <div>
                <i class="fa-solid fa-plus text-white"></i>
            </div>
            <div>
                <p class="text-white">New Issue</p>
            </div>
           </div>
          </div>
        </section>
    </header>
    <main>
<!-- btn -->
 <section class="flex gap-2  mt-3 shadow-sm bg-white w-[365px] md:w-[1350px] mx-auto p-3 rounded-md" id="button-contaier">
    <div>
        <button id="all"  onclick="dynamicbtn('all')" class="active border px-8 py-1 text-gray-600 rounded-md button">All</button>
    </div>
    <div>
        <button id="open" onclick="dynamicbtn('open')" class="  border px-8 py-1 text-gray-600 rounded-md button">Open</button>
    </div>
    <div>
        <button id="closed" onclick="dynamicbtn('closed')" class="border text-gray-600 px-8 py-1 rounded-md button ">Closed</button>
    </div>
 </section>
 <!-- count card -->
  <section  class="mt-3 shadow-sm md:w-[1350px] w-[365px] md:space-y-0  mx-auto p-3 bg-white rounded-md   ">
    <div class="md:flex justify-between items-center">
        <!-- track and manage -->
        <div class="flex items-center gap-5 ">
            <div>
                <img src="./B13-A5-Github-Issue-Tracker/assets/Aperture.png" alt="">
            </div>
            <div>
                <h1 class="text-lg font-semibold"> <span id="issues-count">50</span> Issues</h1>
                <p class="text-gray-500">Track and Manage your project issues</p>
            </div>
        </div>
        <!-- open closed section -->
        <div class="flex gap-2 md:justify-start justify-center ">
            <div class="flex items-center gap-1">
                <div>
                    <img src="./B13-A5-Github-Issue-Tracker/assets/Ellipse 2.png" alt="">
                </div>
                <div>
                    <h1>Open</h1>
                </div>
            </div>
            <div class="flex items-center gap-1">
                <div>
                    <img src="/B13-A5-Github-Issue-Tracker/assets/Ellipse 2 (1).png" alt="">
                </div>
                <div>
                    <h1>Closed</h1>
                </div>
            </div>
        </div>
    </div>
  </section>
  <!-- card section -->
   <section class="">
    <div id="card-container" class="shadow-md  bg-white min-h-screen mt-10 w-full  rounded-md  md:w-[1350px] mx-auto p-3 grid md:grid-cols-4  grid-cols-1 gap-5">
        <div id="child-container" class="" >
  
      
       
    </div>
      <!-- loading spinner -->
    <div id="spinner" class="hidden justify-center items-center w-full py-20 min-h-[400px]">
    <span class="loading loading-dots loading-xl text-blue-600"></span>
</div>
   </section>
  
 <!-- modal -->
  <!-- Open the modal using ID.showModal() method -->

<dialog id="mymodal" class="modal">
  <div class="modal-box">
    <!-- priority + status img -->
    <div class="flex justify-between items-center">
        <img id="modal-status-img" src="" alt="">
        <p id="modal-priority" class="px-4 py-1 rounded-md"></p>
    </div>
    <!-- title + description -->
    <div class="mt-3">
        <h1 id="modal-title" class="text-xl font-bold"></h1>
        <p id="modal-description" class="text-gray-400"></p>
    </div>
    <!-- labels -->
    <div class="flex gap-2 justify-center mt-3">
        <div class="flex items-center gap-1 bg-red-200 px-3 rounded-md h-10">
            <img class="w-3" src="./B13-A5-Github-Issue-Tracker/assets/Vector.png" alt="">
            <p id="modal-label1" class="text-red-500 text-sm font-semibold"></p>
        </div>
        <div class="flex items-center gap-1 bg-yellow-100 px-3 py-1 h-10 rounded-md">
            <img class="w-4" src="./B13-A5-Github-Issue-Tracker/assets/Vector (1).png" alt="">
            <p id="modal-label2" class="text-yellow-600 text-sm font-semibold"></p>
        </div>
    </div>
    <hr class="mt-3">
    <!-- author + date -->
    <div class="mt-3">
        <p id="modal-author" class="text-gray-400"></p>
        <p id="modal-created" class="text-gray-400"></p>
    </div>
    <div class="modal-action">
      <form method="dialog">
        <button class="btn">Close</button>
      </form>
    </div>
  </div>
</dialog>
    </main>
    <script src="script.js"></script>
</body>
</html>
