<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <head>
  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<style>
    .geist{
        

  font-family: "Geist", sans-serif;
  font-optical-sizing: auto;
  

}
  
</style>
</head>
</head>
<body>
    <main class="geist flex justify-center items-center min-h-screen">
        <section class="w-[500px] min-h-[650px] border flex flex-col shadow-lg p-8 space-y-3">
            <div class="flex justify-center ">
                <img src="/B13-A5-Github-Issue-Tracker/assets/github-logo.png" alt="">
            </div>
            <h1 class="text-4xl font-bold text-center">Github Issues Tracker</h1>
            <p class="text-[#64748B] text-center ">Login to manage your issues</p>

             <div class="space-y-3 ">
               <label class="text-xl " for="">Username:</label> <br>
                <input class="border border-gray-300 w-full mx-auto block h-10  " type="text" name="" id="username-container">
                 <label class="text-xl " for="">Password:</label> <br>
                <input  class="border border-gray-300 w-full mx-auto block h-10 " type="password" name="" id="pass-container">
                <button onclick="login()" id="login-btn" class="w-full bg-blue-600 text-white py-2 mx-auto block rounded-lg">Login Now</button>
            </div>
            <!-- demo of Username and password -->
            <div>
                <div class="flex  items-center w-full">
                    <div class="flex-grow h-px bg-gray-300"></div>
                    <span class="text-gray-700 font-medium p-2">OR</span>
                    <div class="flex-grow h-px bg-gray-300"></div>
                </div>
            </div>
            <div>
                <h1 class="text-gray-500 text-base text-center">Demo Credential: </h1>
                <div class="shadow-lg h-28 flex flex-col justify-center items-center border mt-2">
                    <p class="text-center"><span class="font-bold">Username</span>:admin</p>
                    <p class="text-center"><span class="font-bold">Password</span>:admin123</p>
                </div>
            </div>
        </section>
       
    </main>
    <script src="login.js"></script>
</body>
</html>
